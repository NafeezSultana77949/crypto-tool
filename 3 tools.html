<!DOCTYPE html>
<html>
<head>
    <title>Cryptography Tool</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
            background-color: #f4f4f4;
        }
        input, button, select, textarea {
            padding: 10px;
            margin: 10px;
            width: 280px;
        }
        textarea {
            height: 120px;
        }
    </style>
</head>
<body>

    <h2>🔐 Cryptography Tool</h2>

    <!-- Select Method -->
    <select id="method" onchange="toggleInputs()">
        <option value="caesar">Caesar Cipher</option>
        <option value="rail">Rail Fence Cipher</option>
        <option value="sha">SHA-512</option>
    </select><br>

    <!-- Input Text -->
    <input type="text" id="text" placeholder="Enter text"><br>

    <!-- Caesar Shift -->
    <input type="number" id="shift" placeholder="Enter shift value"><br>

    <!-- Rail Key -->
    <input type="number" id="key" placeholder="Enter number of rails"><br>

    <!-- Buttons -->
    <button onclick="processEncrypt()">Encrypt</button>
    <button onclick="processDecrypt()">Decrypt</button>
    <button onclick="generateHash()">Generate Hash</button>

    <textarea id="result" placeholder="Result will appear here..." readonly></textarea>

    <script>
        function toggleInputs() {
            let method = document.getElementById("method").value;

            document.getElementById("shift").style.display = (method === "caesar") ? "block" : "none";
            document.getElementById("key").style.display = (method === "rail") ? "block" : "none";
        }

        // Caesar Cipher
        function caesarCipher(text, shift) {
            let result = "";
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char.match(/[a-z]/i)) {
                    let code = text.charCodeAt(i);
                    if (code >= 65 && code <= 90)
                        char = String.fromCharCode(((code - 65 + shift + 26) % 26) + 65);
                    else if (code >= 97 && code <= 122)
                        char = String.fromCharCode(((code - 97 + shift + 26) % 26) + 97);
                }
                result += char;
            }
            return result;
        }

        // Rail Fence Encrypt
        function railFenceEncrypt(text, key) {
            if (key <= 1) return text;
            let rail = Array.from({ length: key }, () => []);
            let dirDown = false, row = 0;

            for (let char of text) {
                rail[row].push(char);
                if (row === 0 || row === key - 1) dirDown = !dirDown;
                row += dirDown ? 1 : -1;
            }

            return rail.flat().join("");
        }

        // Rail Fence Decrypt
        function railFenceDecrypt(cipher, key) {
            if (key <= 1) return cipher;

            let rail = Array.from({ length: key }, () => Array(cipher.length).fill('\n'));
            let dirDown, row = 0, col = 0;

            for (let i = 0; i < cipher.length; i++) {
                if (row === 0) dirDown = true;
                if (row === key - 1) dirDown = false;

                rail[row][col++] = '*';
                row += dirDown ? 1 : -1;
            }

            let index = 0;
            for (let i = 0; i < key; i++) {
                for (let j = 0; j < cipher.length; j++) {
                    if (rail[i][j] === '*' && index < cipher.length)
                        rail[i][j] = cipher[index++];
                }
            }

            let result = '';
            row = 0; col = 0;

            for (let i = 0; i < cipher.length; i++) {
                if (row === 0) dirDown = true;
                if (row === key - 1) dirDown = false;

                result += rail[row][col++];
                row += dirDown ? 1 : -1;
            }

            return result;
        }

        // SHA-512
        async function sha512(message) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const hashBuffer = await crypto.subtle.digest("SHA-512", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
        }

        // Process Encrypt
        function processEncrypt() {
            let method = document.getElementById("method").value;
            let text = document.getElementById("text").value;

            if (method === "caesar") {
                let shift = parseInt(document.getElementById("shift").value);
                document.getElementById("result").value = caesarCipher(text, shift);
            } else if (method === "rail") {
                let key = parseInt(document.getElementById("key").value);
                document.getElementById("result").value = railFenceEncrypt(text, key);
            }
        }

        // Process Decrypt
        function processDecrypt() {
            let method = document.getElementById("method").value;
            let text = document.getElementById("text").value;

            if (method === "caesar") {
                let shift = parseInt(document.getElementById("shift").value);
                document.getElementById("result").value = caesarCipher(text, -shift);
            } else if (method === "rail") {
                let key = parseInt(document.getElementById("key").value);
                document.getElementById("result").value = railFenceDecrypt(text, key);
            }
        }

        // Generate Hash
        async function generateHash() {
            let text = document.getElementById("text").value;
            let hash = await sha512(text);
            document.getElementById("result").value = hash;
        }

        // Initial setup
        toggleInputs();
    </script>

</body>
</html>
